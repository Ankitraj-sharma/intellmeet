apiVersion: apps/v1
kind: Deployment
metadata:
  name: intellmeet-backend
  namespace: intellmeet
  labels:
    app: intellmeet
    component: backend
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: intellmeet
      component: backend
  template:
    metadata:
      labels:
        app: intellmeet
        component: backend
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    component: backend
      containers:
        - name: backend
          image: ghcr.io/your-org/intellmeet/backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
              protocol: TCP
          envFrom:
            - secretRef:
                name: intellmeet-secrets
            - configMapRef:
                name: intellmeet-config
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
---
apiVersion: v1
kind: Service
metadata:
  name: intellmeet-backend
  namespace: intellmeet
spec:
  selector:
    app: intellmeet
    component: backend
  ports:
    - port: 5000
      targetPort: 5000
      protocol: TCP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: intellmeet-backend-hpa
  namespace: intellmeet
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: intellmeet-backend
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
